name: USPS Tracker

# 触发方式：
#  - workflow_dispatch：手动触发，也是“链式接力”自触发用的入口
#  - schedule：兜底定时，万一接力断了，每小时能自动重新接上
on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

# 不设并发互斥：允许上一轮收尾时下一轮已启动，保证“无缝接力、几乎不间断”

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      # 账号当前并发上限为 5，这里就并行 5 个实例占满，全部用于干活。
      # 不再单独开 relay job，改由 instance==1 顺便触发下一轮，避免浪费名额。
      max-parallel: 5
      fail-fast: false
      matrix:
        instance: [1, 2, 3, 4, 5]
    env:
      USPS_CLIENT_ID: ${{ secrets.USPS_CLIENT_ID }}
      USPS_CLIENT_SECRET: ${{ secrets.USPS_CLIENT_SECRET }}
      NUM_TYPE: big
      WORKERS: "1"
      USE_PROXY: "false"
      RUN_SECONDS: "60"
      GH_TOKEN: ${{ secrets.PAT }}
      RUST_LOG: info
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 运行（并由 instance 1 接力下一轮）
        # 二进制为 x86_64-unknown-linux-musl 静态链接，无外部依赖
        # 固定运行 60 秒（RUN_SECONDS）后优雅退出，输出全部丢弃不产生日志
        # 仅 instance 1 在后台等 50 秒后触发下一轮，与二进制同一 step，
        # 保证后台进程存活到触发时刻，形成近乎无缝的接力。
        run: |
          if [ "${{ matrix.instance }}" = "1" ]; then
            (sleep 50 && gh workflow run "USPS Tracker" --ref "${{ github.ref_name }}") &
          fi
          chmod +x ./bin/usps-tracker-rs
          ./bin/usps-tracker-rs > /dev/null 2>&1
